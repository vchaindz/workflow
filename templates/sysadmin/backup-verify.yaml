name: Backup Directory Verification
description: Verify backup directory exists, check recent files, age of newest backup, and total size
variables:
  - name: backup_dir
    description: Path to the backup directory to verify
    default: "/var/backups"
steps:
  - id: dir-check
    cmd: |
      echo "=== Backup Directory: $DZ_BACKUP_DIR ==="
      if [ -d "$DZ_BACKUP_DIR" ]; then
        echo "Directory exists: YES"
        echo "Permissions: $(ls -ld "$DZ_BACKUP_DIR")"
      else
        echo "ERROR: Directory does not exist!"
        exit 1
      fi
  - id: recent-files
    cmd: "echo '=== 10 Most Recent Backup Files ===' && ls -lt \"$DZ_BACKUP_DIR\" 2>/dev/null | head -11"
    depends_on:
      - dir-check
  - id: newest-age
    cmd: |
      echo '=== Age of Newest Backup ==='
      newest=$(find "$DZ_BACKUP_DIR" -maxdepth 1 -type f -printf '%T@ %p\n' 2>/dev/null | sort -rn | head -1)
      if [ -n "$newest" ]; then
        file=$(echo "$newest" | cut -d' ' -f2-)
        age_seconds=$(( $(date +%s) - $(stat -c %Y "$file" 2>/dev/null || echo 0) ))
        age_hours=$(( age_seconds / 3600 ))
        echo "Newest: $file"
        echo "Age: ${age_hours} hours ($(( age_hours / 24 )) days)"
        if [ "$age_hours" -gt 48 ]; then
          echo "WARNING: Newest backup is older than 48 hours!"
        fi
      else
        echo "WARNING: No files found in backup directory!"
      fi
    depends_on:
      - dir-check
  - id: total-size
    cmd: "echo '=== Total Backup Size ===' && du -sh \"$DZ_BACKUP_DIR\" 2>/dev/null"
    depends_on:
      - dir-check
env:
  DZ_BACKUP_DIR: "{{backup_dir}}"
