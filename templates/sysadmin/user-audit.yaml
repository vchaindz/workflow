name: User Account Audit
description: Audit user accounts, check for empty passwords, show recent logins, and list sudo users
steps:
  - id: login-users
    cmd: "echo '=== Users with Login Shells ===' && grep -v -E '(/nologin|/false|/sync|/shutdown|/halt)$' /etc/passwd | awk -F: '{printf \"%-20s UID=%-6s HOME=%s\\n\", $1, $3, $6}'"
  - id: empty-passwords
    cmd: "echo '=== Empty Password Check ===' && sudo awk -F: '($2 == \"\" || $2 == \"!\") {print $1, \"- WARNING: no password set\"}' /etc/shadow 2>/dev/null || echo 'Cannot read /etc/shadow (need sudo)'"
  - id: recent-logins
    cmd: "echo '=== Recent Logins (last 10) ===' && last -n 10 --time-format short 2>/dev/null || last -n 10"
  - id: sudo-users
    cmd: "echo '=== Sudo Users ===' && getent group sudo wheel 2>/dev/null || echo 'No sudo/wheel group found' && echo '--- sudoers.d entries ---' && sudo ls /etc/sudoers.d/ 2>/dev/null || echo 'Cannot list sudoers.d'"
  - id: failed-logins
    cmd: "echo '=== Failed Login Attempts ===' && sudo lastb -n 10 2>/dev/null || echo 'Cannot read btmp (need sudo)'"
