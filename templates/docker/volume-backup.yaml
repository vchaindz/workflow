name: Docker Volume Backup
description: List volumes, show usage, and create a tar backup of a named volume
variables:
  - name: volume_name
    description: Docker volume name to backup
    default: ""
    choices_cmd: "docker volume ls -q"
  - name: backup_path
    description: Directory to store the backup tar file
    default: "/tmp"
steps:
  - id: list-volumes
    cmd: "echo '=== Docker Volumes ===' && docker volume ls --format 'table {{.Name}}\t{{.Driver}}\t{{.Mountpoint}}'"
  - id: volume-sizes
    needs: [list-volumes]
    cmd: |
      echo '=== Volume Sizes ==='
      docker volume ls -q | while read vol; do
        size=$(docker run --rm -v "$vol":/data alpine sh -c 'du -sh /data 2>/dev/null' 2>/dev/null | cut -f1)
        printf "%-40s %s\n" "$vol" "${size:-unknown}"
      done
  - id: backup
    needs: [volume-sizes]
    cmd: |
      if [ -z "$DZ_VOLUME_NAME" ]; then
        echo 'Set the volume_name variable to a volume from the list above'
        exit 0
      fi
      echo "=== Backing up volume: $DZ_VOLUME_NAME ==="
      backup_file="$DZ_BACKUP_PATH/docker-vol-${DZ_VOLUME_NAME}-$(date +%Y%m%d-%H%M%S).tar.gz"
      docker run --rm -v "$DZ_VOLUME_NAME":/source -v "$DZ_BACKUP_PATH":/backup alpine tar czf "/backup/$(basename $backup_file)" -C /source . 2>/dev/null && echo "Backup saved: $backup_file" || echo "ERROR: Backup failed for volume $DZ_VOLUME_NAME"
env:
  DZ_VOLUME_NAME: "{{volume_name}}"
  DZ_BACKUP_PATH: "{{backup_path}}"
