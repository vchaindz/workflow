name: Docker Security Overview
description: Check container security posture - privileged mode, capabilities, root users
variables:
  - name: container
    description: Container to scan (blank for all)
    default: ""
    choices_cmd: "docker ps --format '{{.Names}}'"
steps:
  - id: privileged-containers
    cmd: |
      echo '=== Privileged Containers ==='
      containers="${DZ_CONTAINER:-$(docker ps --format '{{.Names}}')}"
      echo "$containers" | while read name; do
        [ -z "$name" ] && continue
        priv=$(docker inspect --format '{{.HostConfig.Privileged}}' "$name" 2>/dev/null)
        if [ "$priv" = "true" ]; then
          echo "WARNING: $name is running in privileged mode!"
        fi
      done
      echo 'Check complete'
  - id: root-containers
    cmd: |
      echo '=== Containers Running as Root ==='
      containers="${DZ_CONTAINER:-$(docker ps --format '{{.Names}}')}"
      echo "$containers" | while read name; do
        [ -z "$name" ] && continue
        user=$(docker inspect --format '{{.Config.User}}' "$name" 2>/dev/null)
        if [ -z "$user" ] || [ "$user" = "root" ] || [ "$user" = "0" ]; then
          echo "  $name (user: ${user:-default/root})"
        fi
      done
  - id: exposed-ports
    cmd: |
      echo '=== Containers with Host-Bound Ports ==='
      if [ -n "$DZ_CONTAINER" ]; then
        docker ps --format '{{.Names}}\t{{.Ports}}' | grep "$DZ_CONTAINER" | grep '0.0.0.0' || echo "No host-bound ports on $DZ_CONTAINER"
      else
        docker ps --format '{{.Names}}\t{{.Ports}}' | grep '0.0.0.0' || echo 'No containers bound to all interfaces'
      fi
  - id: capabilities
    cmd: |
      echo '=== Added Capabilities ==='
      containers="${DZ_CONTAINER:-$(docker ps --format '{{.Names}}')}"
      echo "$containers" | while read name; do
        [ -z "$name" ] && continue
        caps=$(docker inspect --format '{{.HostConfig.CapAdd}}' "$name" 2>/dev/null)
        if [ "$caps" != "[]" ] && [ "$caps" != "<nil>" ] && [ -n "$caps" ]; then
          echo "  $name: $caps"
        fi
      done
      echo 'Check complete'
env:
  DZ_CONTAINER: "{{container}}"
