name: Secret & ConfigMap Audit
description: List secrets and configmaps, find unused ones, check for expiring TLS certs
variables:
  - name: namespace
    description: Namespace to audit (blank for all namespaces)
    default: ""
steps:
  - id: secrets-summary
    cmd: |
      echo '=== Secrets by Type ==='
      ns_flag="--all-namespaces"
      [ -n "$DZ_NAMESPACE" ] && ns_flag="-n $DZ_NAMESPACE"
      kubectl get secrets $ns_flag --no-headers 2>/dev/null | awk '{print $NF}' | sort | uniq -c | sort -rn || echo 'No secrets found'
  - id: tls-expiry
    cmd: |
      echo '=== TLS Certificate Expiry Check ==='
      ns_flag="--all-namespaces"
      [ -n "$DZ_NAMESPACE" ] && ns_flag="-n $DZ_NAMESPACE"
      kubectl get secrets $ns_flag -o json 2>/dev/null | python3 -c "
      import json, sys, base64, subprocess
      from datetime import datetime
      try:
        data = json.load(sys.stdin)
        for item in data.get('items', []):
          if item.get('type') == 'kubernetes.io/tls':
            ns = item['metadata']['namespace']
            name = item['metadata']['name']
            cert_data = item['data'].get('tls.crt', '')
            if cert_data:
              cert_pem = base64.b64decode(cert_data)
              result = subprocess.run(['openssl', 'x509', '-noout', '-enddate'], input=cert_pem, capture_output=True)
              expiry = result.stdout.decode().strip().replace('notAfter=', '')
              print(f'  {ns}/{name}: expires {expiry}')
        print('Check complete')
      except Exception as e: print(f'Cannot check TLS: {e}')
      " || echo 'Cannot check TLS certificates'
  - id: configmaps
    cmd: |
      echo '=== ConfigMaps ==='
      ns_flag="--all-namespaces"
      [ -n "$DZ_NAMESPACE" ] && ns_flag="-n $DZ_NAMESPACE"
      kubectl get configmaps $ns_flag 2>/dev/null | head -30 || echo 'No configmaps found'
  - id: large-secrets
    cmd: |
      echo '=== Large Secrets (>10KB) ==='
      ns_flag="--all-namespaces"
      [ -n "$DZ_NAMESPACE" ] && ns_flag="-n $DZ_NAMESPACE"
      kubectl get secrets $ns_flag -o json 2>/dev/null | python3 -c "
      import json, sys
      try:
        data = json.load(sys.stdin)
        for item in data.get('items', []):
          ns = item['metadata']['namespace']
          name = item['metadata']['name']
          size = sum(len(v) for v in item.get('data', {}).values())
          if size > 10240:
            print(f'  {ns}/{name}: {size//1024}KB')
        print('Check complete')
      except: print('Cannot analyze secrets')
      " || echo 'Cannot check secret sizes'
env:
  DZ_NAMESPACE: "{{namespace}}"
