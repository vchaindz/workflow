name: Release Binaries

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.4.0)'
        required: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-apple-darwin
            os: macos-13
            name: macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-aarch64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --features mcp --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          strip workflow || true
          tar czf workflow-${{ inputs.tag }}-${{ matrix.name }}.tar.gz workflow
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ inputs.tag }} \
            target/${{ matrix.target }}/release/workflow-${{ inputs.tag }}-${{ matrix.name }}.tar.gz \
            --clobber
