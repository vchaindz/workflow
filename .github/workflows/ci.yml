name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'website/**'
      - 'docs/**'
      - '*.md'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all
      - run: cargo test --features mcp
      - run: cargo clippy -- -D warnings
      - run: cargo clippy --features mcp -- -D warnings
